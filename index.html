<!DOCTYPE html>
<html>
<head>
    <title>ESP32 Pulse Monitor 2</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .card { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        button { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; background: #007AFF; color: white; border: none; border-radius: 12px; cursor: pointer; margin-bottom: 20px; }
        button:active { background: #0056b3; }
        #bpm { font-size: 72px; font-weight: bold; color: #ff3b30; margin: 20px 0; }
        #status { color: #8e8e93; font-size: 14px; margin-bottom: 20px; }
        canvas { width: 100%; height: 150px; background: #fff5f5; border-radius: 10px; border: 1px solid #ffebeb; }
    </style>
</head>
<body>

<div class="card">
    <button id="connectBtn">ПОДКЛЮЧИТЬ ПЛАТУ</button>
    <div id="status">Нажми кнопку для поиска 2</div>
    <div id="bpm">--</div>
    <canvas id="graph"></canvas>
</div>

<script>
    // Те же UUID, что в твоем коде на ESP32
    const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const TX_CHARACTERISTIC_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

    let points = [];
    const canvas = document.getElementById('graph');
    const ctx = canvas.getContext('2d');
    const bpmDisplay = document.getElementById('bpm');
    const statusText = document.getElementById('status');
    const connectBtn = document.getElementById('connectBtn');

    connectBtn.addEventListener('click', async () => {
        try {
            statusText.innerText = "Поиск устройств...";
            
            // Включаем поиск ВСЕХ устройств без фильтра по имени
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [SERVICE_UUID]
            });

            statusText.innerText = "Подключение к " + (device.name || "ESP32") + "...";
            
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            const characteristic = await service.getCharacteristic(TX_CHARACTERISTIC_UUID);

            // Подписываемся на данные (Subscribe)
            await characteristic.startNotifications();
            characteristic.addEventListener('characteristicvaluechanged', (event) => {
                const decoder = new TextDecoder('utf-8');
                const rawData = decoder.decode(event.target.value);
                
                // Извлекаем число из строки "BPM: 75"
                const val = parseInt(rawData.replace("BPM: ", ""));
                if (!isNaN(val)) {
                    bpmDisplay.innerText = val;
                    updateGraph(val);
                }
            });

            statusText.innerText = "Связь установлена!";
            connectBtn.style.display = "none";

        } catch (error) {
            console.error(error);
            statusText.innerText = "Ошибка: " + error.message;
        }
    });

    function updateGraph(val) {
        points.push(val);
        if (points.length > 40) points.shift();

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "#ff3b30";
        ctx.lineWidth = 4;
        ctx.lineJoin = "round";
        ctx.beginPath();
        
        const spacing = canvas.width / 40;
        for (let i = 0; i < points.length; i++) {
            // Рисуем график (BPM от 50 до 110)
            const y = canvas.height - ((points[i] - 50) * (canvas.height / 60));
            const x = i * spacing;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
    }
</script>
</body>
</html>
